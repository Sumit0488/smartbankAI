name: SmartBankAI Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  NODE_VERSION: '18'
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ─── Validate & Test ───────────────────────────────────────────────────────
  test:
    name: Validate & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate GraphQL schema
        run: node scripts/validateSchema.js

      - name: Run tests
        run: npm test -- --passWithNoTests
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          COGNITO_USER_POOL_ID: dummy-pool-id
          SES_FROM_EMAIL: test@example.com
          EVENT_BUS_NAME: test-bus
          SNS_TOPIC_ARN: arn:aws:sns:ap-south-1:123456789012:test

  # ─── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: SAM Deploy to AWS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Create S3 deployment bucket (if not exists)
        run: |
          BUCKET="${{ secrets.S3_DEPLOYMENT_BUCKET }}"
          REGION="${{ secrets.AWS_REGION }}"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
          fi

      - name: Upload AppSync CloudFormation template + schema to S3
        run: |
          aws s3 sync infrastructure/cloudformation/ \
            s3://${{ secrets.S3_DEPLOYMENT_BUCKET }}/cloudformation/ \
            --region ${{ secrets.AWS_REGION }}
          cat graphql/schema/shared.graphql \
              graphql/schema/user.graphql \
              graphql/schema/auth.graphql \
              graphql/schema/loan.graphql \
              graphql/schema/investment.graphql \
              graphql/schema/expense.graphql \
              graphql/schema/card.graphql \
              graphql/schema/forex.graphql \
              graphql/schema/bank.graphql > /tmp/smartbankai.graphql
          aws s3 cp /tmp/smartbankai.graphql \
            s3://${{ secrets.S3_DEPLOYMENT_BUCKET }}/schema/smartbankai.graphql \
            --region ${{ secrets.AWS_REGION }}

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: SAM Build
        run: sam build --use-container

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name smartbankai-prod \
            --s3-bucket ${{ secrets.S3_DEPLOYMENT_BUCKET }} \
            --s3-prefix sam \
            --region ${{ secrets.AWS_REGION }} \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --no-fail-on-empty-changeset \
            --no-confirm-changeset \
            --parameter-overrides \
              Environment=prod \
              "MongoDBUri=${{ secrets.MONGODB_URI }}" \
              DeploymentBucket=${{ secrets.S3_DEPLOYMENT_BUCKET }}

      - name: Print stack outputs
        if: success()
        run: |
          echo ""
          echo "============================================================"
          echo "  DEPLOYMENT COMPLETE — copy these to your frontend .env"
          echo "============================================================"
          aws cloudformation describe-stacks \
            --stack-name smartbankai-prod \
            --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].Outputs[*].{Key:OutputKey,Value:OutputValue}" \
            --output table
          APPSYNC_URL=$(aws cloudformation describe-stacks \
            --stack-name smartbankai-prod --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='GraphQLApiUrl'].OutputValue" \
            --output text)
          API_KEY=$(aws cloudformation describe-stacks \
            --stack-name smartbankai-prod --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='GraphQLApiKey'].OutputValue" \
            --output text)
          POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name smartbankai-prod --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolId'].OutputValue" \
            --output text)
          CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name smartbankai-prod --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolClientId'].OutputValue" \
            --output text)
          echo "  VITE_APPSYNC_URL=$APPSYNC_URL"
          echo "  VITE_APPSYNC_API_KEY=$API_KEY"
          echo "  VITE_COGNITO_USER_POOL_ID=$POOL_ID"
          echo "  VITE_COGNITO_CLIENT_ID=$CLIENT_ID"
          echo "============================================================"

      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: '{"text":"SmartBankAI *prod* deployment succeeded. Commit: ${{ github.sha }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: '{"text":"SmartBankAI *prod* deployment FAILED. Commit: ${{ github.sha }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
