name: SmartBankAI Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  NODE_VERSION: '18'
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ─── Validate ──────────────────────────────────────────────────────────────
  validate:
    name: Validate Schema & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate GraphQL schema
        run: node scripts/validateSchema.js

      - name: Run linter
        run: npm run lint --if-present

  # ─── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --passWithNoTests --coverage --coverageReporters=lcov
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          COGNITO_USER_POOL_ID: dummy-pool-id
          SES_FROM_EMAIL: test@example.com
          EVENT_BUS_NAME: test-bus
          SNS_TOPIC_ARN: arn:aws:sns:ap-south-1:123456789012:test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/lcov.info

  # ─── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS (AppSync + Lambda + All Resources)
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── Bootstrap: create S3 deployment bucket if it doesn't exist ──────────
      - name: Create S3 deployment bucket (if not exists)
        run: |
          BUCKET="${{ secrets.S3_DEPLOYMENT_BUCKET }}"
          REGION="${{ secrets.AWS_REGION }}"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Creating S3 bucket: $BUCKET"
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            else
              aws s3api create-bucket \
                --bucket "$BUCKET" \
                --region "$REGION" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            echo "Bucket created and versioning enabled."
          else
            echo "Bucket $BUCKET already exists."
          fi

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Write minimal .env for deploy script
        run: |
          cat > .env << 'ENVEOF'
          AWS_REGION=${{ secrets.AWS_REGION }}
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          CF_STACK_NAME=${{ secrets.CF_STACK_NAME }}
          S3_DEPLOYMENT_BUCKET=${{ secrets.S3_DEPLOYMENT_BUCKET }}
          NODE_ENV=production
          ENVEOF

      # ── Deploy: CloudFormation creates Cognito, SNS, S3, EventBridge, AppSync
      - name: Deploy full stack to AWS
        run: bash scripts/deployment/deploy.sh prod
        env:
          MONGODB_URI:          ${{ secrets.MONGODB_URI }}
          CF_STACK_NAME:        ${{ secrets.CF_STACK_NAME }}
          S3_DEPLOYMENT_BUCKET: ${{ secrets.S3_DEPLOYMENT_BUCKET }}
          AWS_REGION:           ${{ secrets.AWS_REGION }}
          SES_FROM_EMAIL:       noreply@smartbankai.com

      # ── Print all created resources so you can use them in the frontend ──────
      - name: Print stack outputs (AppSync URL, Cognito IDs, etc.)
        if: success()
        run: |
          STACK="${{ secrets.CF_STACK_NAME }}-prod"
          REGION="${{ secrets.AWS_REGION }}"
          echo ""
          echo "============================================================"
          echo "  ALL CREATED RESOURCES — copy these to your frontend"
          echo "============================================================"
          aws cloudformation describe-stacks \
            --stack-name "$STACK" \
            --region "$REGION" \
            --query "Stacks[0].Outputs[*].{Key:OutputKey,Value:OutputValue}" \
            --output table
          echo ""
          echo "  Frontend config (src/services/apiService.js):"
          APPSYNC_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" --region "$REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='GraphQLApiUrl'].OutputValue" \
            --output text)
          API_KEY=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" --region "$REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='GraphQLApiKey'].OutputValue" \
            --output text)
          COGNITO_POOL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" --region "$REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolId'].OutputValue" \
            --output text)
          COGNITO_CLIENT=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" --region "$REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolClientId'].OutputValue" \
            --output text)
          echo "  VITE_APPSYNC_URL=$APPSYNC_URL"
          echo "  VITE_APPSYNC_API_KEY=$API_KEY"
          echo "  VITE_COGNITO_USER_POOL_ID=$COGNITO_POOL"
          echo "  VITE_COGNITO_CLIENT_ID=$COGNITO_CLIENT"
          echo "============================================================"

      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: '{"text":"SmartBankAI deployment to *prod* succeeded. Commit: ${{ github.sha }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: '{"text":"SmartBankAI deployment to *prod* FAILED. Commit: ${{ github.sha }} — Check logs immediately."}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
