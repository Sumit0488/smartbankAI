name: Frontend CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Linux native binding for @tailwindcss/oxide
        run: npm install @tailwindcss/oxide-linux-x64-gnu@4.2.1 --no-save --prefer-online

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:4001/graphql

      - name: Build complete
        run: echo "✅ Frontend build passed"
