name: SmartBankAI CI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  validate:
    name: Validate Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check schema files exist
        run: |
          echo "Checking GraphQL schema files..."
          ls src/schema/*.graphql
          echo "✅ All schema files found"

      - name: Validate GraphQL schema
        run: |
          node -e "
            const path = require('path');
            const { mergeTypeDefs } = require('@graphql-tools/merge');
            const { makeExecutableSchema } = require('@graphql-tools/schema');
            const { loadFilesSync } = require('@graphql-tools/load-files');
            try {
              const typeDefs = mergeTypeDefs(loadFilesSync(path.join(process.cwd(), 'src/schema/**/*.graphql')));
              makeExecutableSchema({ typeDefs, resolvers: {} });
              console.log('✅ GraphQL schema is valid');
            } catch (e) {
              console.error('❌ Schema error:', e.message);
              process.exit(1);
            }
          "

      - name: Run tests
        run: npm test -- --passWithNoTests
        continue-on-error: true

  notify:
    name: Status
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    steps:
      - name: Success
        if: needs.validate.result == 'success'
        run: echo "✅ CI passed"

      - name: Failed
        if: needs.validate.result == 'failure'
        run: |
          echo "❌ CI failed"
          exit 1
