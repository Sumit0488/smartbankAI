
name: Deploy Backend (Express Server)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  validate:
    name: Validate GraphQL Schema
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate GraphQL schema
        run: npx graphql-schema-linter "graphql/schema/**/*.graphql"

      - name: Run tests
        run: npm test -- --passWithNoTests
        continue-on-error: true

  # TODO: Add deployment to your hosting platform
  # Options:
  # - AWS EC2 / ECS / Fargate
  # - Heroku
  # - Railway
  # - Render
  # - DigitalOcean App Platform
  
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    
    steps:
      - name: Validation Success
        if: needs.validate.result == 'success'
        run: echo "✅ Backend validation passed"
      
      - name: Validation Failed
        if: needs.validate.result == 'failure'
        run: |
          echo "❌ Backend validation failed"
          exit 1
