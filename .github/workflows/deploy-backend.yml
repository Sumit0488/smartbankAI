name: Deploy Backend (Express Server)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  validate:
    name: Validate & Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check GraphQL schema files exist
        run: |
          echo "Checking schema files..."
          ls src/schema/*.graphql
          echo "✅ Schema files found"

      - name: Validate GraphQL schema loads correctly
        run: |
          node -e "
            const path = require('path');
            const { mergeTypeDefs } = require('@graphql-tools/merge');
            const { makeExecutableSchema } = require('@graphql-tools/schema');
            const { loadFilesSync } = require('@graphql-tools/load-files');
            try {
              const schemaDir = path.join(__dirname, 'src/schema');
              const typeDefs = mergeTypeDefs(loadFilesSync(path.join(schemaDir, '**/*.graphql')));
              makeExecutableSchema({ typeDefs, resolvers: {} });
              console.log('✅ GraphQL schema is valid');
            } catch (e) {
              console.error('❌ Schema validation failed:', e.message);
              process.exit(1);
            }
          "

      - name: Run tests
        run: npm test -- --passWithNoTests
        continue-on-error: true

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: validate
    if: always()

    steps:
      - name: Validation Success
        if: needs.validate.result == 'success'
        run: echo "✅ Backend validation passed"

      - name: Validation Failed
        if: needs.validate.result == 'failure'
        run: |
          echo "❌ Backend validation failed"
          exit 1
