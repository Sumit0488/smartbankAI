name: Manual Rollback

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type ROLLBACK to confirm"
        required: true

jobs:
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: ${{ inputs.confirm == 'ROLLBACK' }}
    steps:
      - uses: actions/checkout@v4
      - name: Done
        run: echo "Rollback triggered by ${{ github.actor }}"
