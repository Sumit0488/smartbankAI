name: SmartBankAI Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  NODE_VERSION: '18'
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ─── Validate ──────────────────────────────────────────────────────────────
  validate:
    name: Validate Schema & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate GraphQL schema
        run: node scripts/validateSchema.js

      - name: Run linter
        run: npm run lint --if-present

  # ─── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --passWithNoTests --coverage --coverageReporters=lcov
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.MONGODB_URI_TEST }}
          AWS_REGION: ap-south-1
          COGNITO_USER_POOL_ID: dummy
          SES_FROM_EMAIL: test@example.com
          EVENT_BUS_NAME: test-bus
          SNS_TOPIC_ARN: arn:aws:sns:ap-south-1:123456789012:test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/lcov.info

  # ─── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Write environment file
        run: |
          cat > .env << EOF
          AWS_REGION=${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          COGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }}
          SES_FROM_EMAIL=${{ secrets.SES_FROM_EMAIL }}
          SNS_TOPIC_ARN=${{ secrets.SNS_TOPIC_ARN }}
          EVENT_BUS_NAME=${{ secrets.EVENT_BUS_NAME }}
          S3_KYC_BUCKET=${{ secrets.S3_KYC_BUCKET }}
          S3_LOAN_DOCS_BUCKET=${{ secrets.S3_LOAN_DOCS_BUCKET }}
          S3_USER_FILES_BUCKET=${{ secrets.S3_USER_FILES_BUCKET }}
          NOTIFICATION_QUEUE_URL=${{ secrets.NOTIFICATION_QUEUE_URL }}
          EVENTS_QUEUE_URL=${{ secrets.EVENTS_QUEUE_URL }}
          CF_STACK_NAME=${{ secrets.CF_STACK_NAME }}
          S3_DEPLOYMENT_BUCKET=${{ secrets.S3_DEPLOYMENT_BUCKET }}
          NODE_ENV=production
          EOF

      - name: Deploy
        run: bash scripts/deployment/deploy.sh prod
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          CF_STACK_NAME: ${{ secrets.CF_STACK_NAME }}
          S3_DEPLOYMENT_BUCKET: ${{ secrets.S3_DEPLOYMENT_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
          SNS_TOPIC_ARN: ${{ secrets.SNS_TOPIC_ARN }}
          EVENT_BUS_NAME: ${{ secrets.EVENT_BUS_NAME }}
          S3_KYC_BUCKET: ${{ secrets.S3_KYC_BUCKET }}

      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: '{"text":"SmartBankAI deployment to *prod* succeeded. Commit: ${{ github.sha }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: '{"text":"SmartBankAI deployment to *prod* FAILED. Commit: ${{ github.sha }} — Check logs immediately."}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
