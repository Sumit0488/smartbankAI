name: SmartBankAI Manual Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options: [dev, staging, prod]
        default: prod
      confirm:
        description: 'Type ROLLBACK to confirm'
        required: true

jobs:
  rollback:
    name: Rollback ${{ inputs.environment }}
    runs-on: ubuntu-latest
    if: inputs.confirm == 'ROLLBACK'
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Write environment file
        run: |
          cat > .env << EOF
          AWS_REGION=${{ secrets.AWS_REGION }}
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          CF_STACK_NAME=${{ secrets.CF_STACK_NAME }}
          S3_DEPLOYMENT_BUCKET=${{ secrets.S3_DEPLOYMENT_BUCKET }}
          SES_FROM_EMAIL=${{ secrets.SES_FROM_EMAIL }}
          EOF

      - name: Execute rollback
        run: bash scripts/deployment/rollback.sh ${{ inputs.environment }}

      - name: Notify rollback
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: '{"text":"SmartBankAI *${{ inputs.environment }}* has been ROLLED BACK by ${{ github.actor }}."}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
