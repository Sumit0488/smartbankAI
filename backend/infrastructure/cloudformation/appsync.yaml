AWSTemplateFormatVersion: '2010-09-09'
Description: SmartBankAI - AWS AppSync GraphQL API

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Default: dev
  CognitoUserPoolId:
    Type: String
  CognitoUserPoolArn:
    Type: String
  UserHandlerArn:
    Type: String
  LoanHandlerArn:
    Type: String
  InvestmentHandlerArn:
    Type: String
  AuthHandlerArn:
    Type: String
  ExpenseHandlerArn:
    Type: String
  CardHandlerArn:
    Type: String
  ForexHandlerArn:
    Type: String
  BankHandlerArn:
    Type: String

Resources:

  # ─── AppSync API ─────────────────────────────────────────────────────────────
  SmartBankGraphQLApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: !Sub 'SmartBankAI-API-${Environment}'
      AuthenticationType: AMAZON_COGNITO_USER_POOLS
      UserPoolConfig:
        UserPoolId: !Ref CognitoUserPoolId
        AwsRegion: !Sub '${AWS::Region}'
        DefaultAction: ALLOW
      AdditionalAuthenticationProviders:
        - AuthenticationType: API_KEY
      LogConfig:
        CloudWatchLogsRoleArn: !GetAtt AppSyncLoggingRole.Arn
        FieldLogLevel: ALL
        ExcludeVerboseContent: false
      XrayEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ─── API Key (for public/health queries) ─────────────────────────────────────
  SmartBankApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt SmartBankGraphQLApi.ApiId
      Description: !Sub 'SmartBankAI API Key - ${Environment}'
      Expires: 1893456000

  # ─── CloudWatch Logging Role ──────────────────────────────────────────────────
  AppSyncLoggingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'SmartBankAI-AppSync-LogRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: appsync.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppSyncPushToCloudWatchLogs

  # ─── Lambda DataSource Role ───────────────────────────────────────────────────
  AppSyncLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'SmartBankAI-AppSync-LambdaRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: appsync.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !Ref UserHandlerArn
                  - !Sub '${UserHandlerArn}:*'
                  - !Ref LoanHandlerArn
                  - !Sub '${LoanHandlerArn}:*'
                  - !Ref InvestmentHandlerArn
                  - !Sub '${InvestmentHandlerArn}:*'
                  - !Ref AuthHandlerArn
                  - !Sub '${AuthHandlerArn}:*'
                  - !Ref ExpenseHandlerArn
                  - !Sub '${ExpenseHandlerArn}:*'
                  - !Ref CardHandlerArn
                  - !Sub '${CardHandlerArn}:*'
                  - !Ref ForexHandlerArn
                  - !Sub '${ForexHandlerArn}:*'
                  - !Ref BankHandlerArn
                  - !Sub '${BankHandlerArn}:*'

  # ─── GraphQL Schema ──────────────────────────────────────────────────────────
  SmartBankSchema:
    Type: AWS::AppSync::GraphQLSchema
    DependsOn: SmartBankGraphQLApi
    Properties:
      ApiId: !GetAtt SmartBankGraphQLApi.ApiId
      DefinitionS3Location: !Sub 's3://storage-s3-siddoji/schema/smartbankai.graphql'

  # ─── Lambda DataSources ───────────────────────────────────────────────────────
  UserLambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt SmartBankGraphQLApi.ApiId
      Name: UserLambdaDataSource
      Type: AWS_LAMBDA
      LambdaConfig:
        LambdaFunctionArn: !Ref UserHandlerArn
      ServiceRoleArn: !GetAtt AppSyncLambdaRole.Arn

  LoanLambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt SmartBankGraphQLApi.ApiId
      Name: LoanLambdaDataSource
      Type: AWS_LAMBDA
      LambdaConfig:
        LambdaFunctionArn: !Ref LoanHandlerArn
      ServiceRoleArn: !GetAtt AppSyncLambdaRole.Arn

  InvestmentLambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt SmartBankGraphQLApi.ApiId
      Name: InvestmentLambdaDataSource
      Type: AWS_LAMBDA
      LambdaConfig:
        LambdaFunctionArn: !Ref InvestmentHandlerArn
      ServiceRoleArn: !GetAtt AppSyncLambdaRole.Arn

  AuthLambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt SmartBankGraphQLApi.ApiId
      Name: AuthLambdaDataSource
      Type: AWS_LAMBDA
      LambdaConfig:
