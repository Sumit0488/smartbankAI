# SmartBank AI — User Management GraphQL Schema

type User {
  _id: ID!
  user_id: String
  name: String!
  email: String!
  role: String
  salary: Float
  profileType: String
  isEmailVerified: Boolean
  createdAt: String
  updatedAt: String
}

input UpdateUserInput {
  name: String
  email: String
  salary: Float
  profileType: String
}

type Query {
  getProfile(id: ID!): User
  getAllUsers: [User]
  getUserById(id: ID!): User
}

type Mutation {
  updateProfile(id: ID!, input: UpdateUserInput!): User
  deleteUser(id: ID!): DeleteResult!
}
